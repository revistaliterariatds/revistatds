<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Enviá tu cuento a Tramas del Sur — Revista independiente de arte y cultura." />

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://fonts.googleapis.com;
    style-src 'self' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data:;
    connect-src 'self' https://script.google.com https://script.googleusercontent.com;
    object-src 'none';
    base-uri 'self';
    form-action 'none';
  " />

  <title>Enviá tu Cuento — Tramas del Sur</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/enviar.css" />
</head>
<body>

  <nav aria-label="Navegación principal">
    <a href="index.html" class="nav-logo" aria-label="Tramas del Sur — Inicio">
      <img src="assets/img/logo/logo.jpeg" alt="Tramas del Sur" />
    </a>
    <a href="index.html" class="btn-volver">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Volver al inicio
    </a>
  </nav>

  <main>

    <!-- ENCABEZADO -->
    <header class="form-header">
      <span class="form-eyebrow">Convocatoria abierta</span>
      <h1 class="form-titulo">Enviá tu Cuento</h1>
      <p class="form-subtitulo">
        Compartí tu historia con nosotros. Leemos cada envío con atención y cuidado.
      </p>
    </header>

    <!-- HILO DECORATIVO -->
    <div class="thread-divider" aria-hidden="true">
      <div class="thread-line"></div>
      <svg width="100" height="20" viewBox="0 0 100 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 10 C8 4,14 16,20 10 S32 4,40 10 S52 16,60 10 S70 4,80 10 S90 16,98 10"
          stroke="#d95f1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </svg>
      <div class="thread-line"></div>
    </div>

    <!-- FORMULARIO -->
    <div class="form-card">
      <form id="envioForm" novalidate>

        <!-- SECCIÓN: DATOS PERSONALES -->
        <fieldset class="form-section" style="border:none; padding:0; margin:0 0 2rem;">
          <legend class="form-section-title">Datos personales</legend>

          <div class="form-row">
            <div class="form-group">
              <label for="nombre">
                Nombre y Apellido <span class="required-mark" aria-hidden="true">*</span>
              </label>
              <input
                type="text"
                id="nombre"
                name="nombre"
                placeholder="Ej: María González"
                autocomplete="name"
                aria-required="true"
                aria-describedby="error-nombre"
              />
              <span class="field-error" id="error-nombre" role="alert"></span>
            </div>

            <div class="form-group">
              <label for="edad">
                Rango de Edad <span class="required-mark" aria-hidden="true">*</span>
              </label>
              <select
                id="edad"
                name="edad"
                aria-required="true"
                aria-describedby="error-edad"
              >
                <option value="" disabled selected>Seleccioná tu rango</option>
                <option value="13 a 17">13 a 17</option>
                <option value="18 a 22">18 a 22</option>
                <option value="23 a 27">23 a 27</option>
                <option value="28 a 32">28 a 32</option>
                <option value="33 a 37">33 a 37</option>
                <option value="38 a 42">38 a 42</option>
                <option value="43 a 47">43 a 47</option>
                <option value="48 a 52">48 a 52</option>
                <option value="53 a 57">53 a 57</option>
                <option value="58 a 62">58 a 62</option>
                <option value="63 a 67">63 a 67</option>
                <option value="68 a 72">68 a 72</option>
                <option value="73 a 77">73 a 77</option>
                <option value="78 a 82">78 a 82</option>
                <option value="83 a 87">83 a 87</option>
                <option value="88 a 92">88 a 92</option>
                <option value="93 a 97">93 a 97</option>
                <option value="98 a 102">98 a 102</option>
                <option value="+100">+100</option>
              </select>
              <span class="field-error" id="error-edad" role="alert"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">
                Correo Electrónico <span class="required-mark" aria-hidden="true">*</span>
              </label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="tu@correo.com"
                autocomplete="email"
                aria-required="true"
                aria-describedby="error-email"
              />
              <span class="field-error" id="error-email" role="alert"></span>
            </div>

            <div class="form-group">
              <label for="genero">
                Género <span class="required-mark" aria-hidden="true">*</span>
              </label>
              <select
                id="genero"
                name="genero"
                aria-required="true"
                aria-describedby="error-genero"
              >
                <option value="" disabled selected>Seleccioná una opción</option>
                <option value="Femenino">Femenino</option>
                <option value="Masculino">Masculino</option>
                <option value="Prefiero no contestar">Prefiero no contestar</option>
              </select>
              <span class="field-error" id="error-genero" role="alert"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="escuela">
              Escuela o Institución <span class="required-mark" aria-hidden="true">*</span>
            </label>
            <input
              type="text"
              id="escuela"
              name="escuela"
              placeholder="Ej: Escuela Secundaria N° 12 / Universidad de Buenos Aires"
              autocomplete="organization"
              aria-required="true"
              aria-describedby="error-escuela"
            />
            <span class="field-error" id="error-escuela" role="alert"></span>
          </div>
        </fieldset>

        <!-- SECCIÓN: SOBRE EL CUENTO -->
        <fieldset class="form-section" style="border:none; padding:0; margin:0 0 2rem;">
          <legend class="form-section-title">Sobre el cuento</legend>

          <div class="form-group">
            <label for="titulo">
              Título <span class="required-mark" aria-hidden="true">*</span>
            </label>
            <input
              type="text"
              id="titulo"
              name="titulo"
              placeholder="El título de tu cuento"
              aria-required="true"
              aria-describedby="error-titulo"
            />
            <span class="field-error" id="error-titulo" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="descripcion">
              Descripción o Reseña <span class="required-mark" aria-hidden="true">*</span>
            </label>
            <textarea
              id="descripcion"
              name="descripcion"
              rows="4"
              placeholder="Una breve descripción de tu cuento: de qué trata, qué lo inspiró, lo que quieras contarnos..."
              aria-required="true"
              aria-describedby="error-descripcion"
            ></textarea>
            <span class="field-error" id="error-descripcion" role="alert"></span>
          </div>

          <!-- ZONA DE CARGA DE ARCHIVO -->
          <div class="form-group">
            <label id="archivo-label">
              Archivo del Cuento <span class="required-mark" aria-hidden="true">*</span>
            </label>
            <div
              class="file-drop-zone"
              id="dropZone"
              role="button"
              tabindex="0"
              aria-labelledby="archivo-label"
              aria-describedby="error-archivoInput archivo-hint"
            >
              <input
                type="file"
                id="archivoInput"
                name="archivoInput"
                accept=".pdf,.doc,.docx,.txt,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain"
                aria-hidden="true"
                tabindex="-1"
              />
              <div class="file-drop-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <p class="file-drop-text">
                <strong>Hacé clic o arrastrá tu archivo aquí</strong><br />
                <span id="archivo-hint" class="file-drop-hint">PDF, DOC, DOCX o TXT · Máximo 10 MB</span>
              </p>
              <p class="file-name-display" id="fileNameDisplay" aria-live="polite"></p>
            </div>
            <span class="field-error" id="error-archivoInput" role="alert"></span>
          </div>
        </fieldset>

        <!-- AUTORIZACIÓN -->
        <div class="check-group">
          <input
            type="checkbox"
            id="autoriza"
            name="autoriza"
            aria-required="true"
            aria-describedby="error-autoriza"
          />
          <label for="autoriza" class="check-label">
            Autorizo a <strong>Tramas del Sur</strong> a recibir, almacenar y, en caso de ser seleccionado, publicar mi cuento en la revista, mencionando mi nombre como autor/a. Entiendo que mis datos personales serán utilizados únicamente a los fines de esta convocatoria.
            <span class="required-mark" aria-hidden="true"> *</span>
          </label>
        </div>
        <span class="field-error" id="error-autoriza" role="alert"></span>

        <!-- BOTÓN ENVIAR -->
        <button type="submit" id="btnEnviar" class="btn-enviar">
          <span class="btn-text">Enviar mi Cuento</span>
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
          <span class="spinner" aria-hidden="true"></span>
        </button>

        <!-- ALERTA DE RESULTADO -->
        <div class="form-alert" id="formAlert" role="status" aria-live="polite"></div>

      </form>
    </div>

  </main>

  <footer>
    <div class="footer-logo">
      <img src="assets/img/logo/logo.jpeg" alt="Tramas del Sur" />
    </div>
    <span class="footer-copy">Revista independiente de arte y cultura · Primera edición</span>
  </footer>

  <script src="assets/js/enviar.js" defer></script>

</body>
</html>
